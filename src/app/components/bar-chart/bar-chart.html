<div class="bar-chart-container">
  <div class="chart-toolbar">
    <div class="metric-switcher">
      @for (m of metrics; track m.key) {
        <button
          class="metric-btn"
          [class.active]="barMetric() === m.key"
          (click)="barMetric.set(m.key)">
          {{ m.label }}
        </button>
      }
    </div>
    <div class="legend">
      <span class="legend-item"><span class="dot api"></span>API</span>
      <span class="legend-item"><span class="dot local"></span>Local</span>
    </div>
  </div>
  <div class="canvas-wrap">
    <canvas #canvas></canvas>
  </div>
</div>
