<header class="app-header">
  <div class="header-title">
    <h1>AI Models</h1>
    <span class="subtitle">Compare prices &amp; intelligence</span>
  </div>

  <div class="controls">
    <div class="control-group">
      <label class="group-label">Intelligence</label>
      <div class="btn-group">
        <button
          [class.active]="state.intelligenceMetric() === 'overall'"
          (click)="setMetric('overall')">Overall</button>
        <button
          [class.active]="state.intelligenceMetric() === 'coding'"
          (click)="setMetric('coding')">Coding</button>
        <button
          [class.active]="state.intelligenceMetric() === 'agentic'"
          (click)="setMetric('agentic')">Agentic</button>
      </div>
    </div>

    <div class="control-group">
      <label class="group-label">Availability</label>
      <div class="btn-group">
        <button
          [class.active]="state.showAPI()"
          (click)="state.showAPI.update(v => !v)">API
        </button>
        <button
          [class.active]="state.showLocal()"
          (click)="state.showLocal.update(v => !v)">Local</button>
      </div>
    </div>

    <div class="control-group">
      <label class="group-label" for="vram-input">Local VRAM (GB)</label>
      <input
        id="vram-input"
        type="number"
        min="0"
        placeholder="All"
        [value]="vramValue"
        (input)="setVram($any($event.target).value)"
        class="vram-input"
      />
    </div>

    <button
      type="button"
      class="theme-toggle"
      [attr.aria-label]="'Switch to ' + (theme.theme() === 'dark' ? 'light' : 'dark') + ' theme'"
      [title]="'Switch to ' + (theme.theme() === 'dark' ? 'light' : 'dark') + ' theme'"
      (click)="theme.toggle()">
      @if (theme.theme() === 'dark') {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>
  </div>
</header>
