<div class="model-toggle-panel">
  <h3 class="panel-title">Models</h3>
  <label class="show-deprecated">
    <input
      type="checkbox"
      [checked]="state.showDeprecated()"
      (change)="state.showDeprecated.update(v => !v)"
    />
    Show deprecated
  </label>
  <ul class="model-list">
    @for (model of sortedModels(); track model.id) {
      <li
        class="model-item"
        [class.disabled]="state.disabledModelIds().has(model.id)"
        (click)="state.toggleModel(model.id)"
        [title]="model.modelName"
      >
        <span class="dot" [class.local]="model.localModel" [class.litellm]="!model.localModel"></span>
        <span class="name">{{ model.publicName }}</span>
      </li>
    }
  </ul>
</div>
