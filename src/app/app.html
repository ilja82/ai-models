<div class="app-layout">
  <app-header />
  <app-update-banner/>

  <div class="main-content">
    <aside class="sidebar">
      <app-model-toggle />
    </aside>

    <main class="view-area">
      <nav class="tab-nav">
        <button
          [class.active]="activeTab() === 'table'"
          (click)="activeTab.set('table')">
          Table
        </button>
        <button
          [class.active]="activeTab() === 'bar'"
          (click)="activeTab.set('bar')">
          Bar Chart
        </button>
        <button
          [class.active]="activeTab() === 'scatter'"
          (click)="activeTab.set('scatter')">
          Scatter Plot
        </button>
        <button
          [class.active]="activeTab() === 'scatter3d'"
          (click)="activeTab.set('scatter3d')">
          3D Scatter
        </button>
      </nav>

      <div class="view-content">
        @if (activeTab() === 'table') {
          <app-data-table />
        }
        @if (activeTab() === 'bar') {
          <app-bar-chart />
        }
        @if (activeTab() === 'scatter') {
          <app-scatter-plot />
        }
        @if (activeTab() === 'scatter3d') {
          <app-scatter-3d-plot/>
        }
      </div>
    </main>
  </div>
</div>
